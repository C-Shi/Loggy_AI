name: Cloud Run

on:
  workflow_run:
    workflows: ["Terraform"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: cloud-run-deploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  verify-prerequisites:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Terraform and Backend Tests both passed
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          check_workflow() {
            local name="$1"
            local conclusion
            conclusion=$(gh run list --repo "$REPO" --workflow="$name" --commit="$SHA" \
              --branch=main --limit=1 --json conclusion --jq '.[0].conclusion')
            if [ "$conclusion" != "success" ]; then
              echo "$name did not succeed for $SHA (got: $conclusion)"
              exit 1
            fi
          }
          check_workflow "Terraform"
          check_workflow "Backend Tests"

  build_and_deploy_service:
    needs: verify-prerequisites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GOOGLE_PROJECT }}
          service_account: cicd-sa@${{ vars.GOOGLE_PROJECT }}.iam.gserviceaccount.com
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set Up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build Image
        run: |
          gcloud auth configure-docker us-west1-docker.pkg.dev
          cd backend
          COMMIT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          docker build --platform="linux/amd64" -t loggy-ai:$COMMIT_SHA .
          docker tag loggy-ai:$COMMIT_SHA us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-service/loggy-ai:$COMMIT_SHA
          docker push us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-service/loggy-ai:$COMMIT_SHA

      - name: Deploy to Cloud Run
        run: |
          COMMIT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          gcloud run deploy loggy-ai-service \
            --image=us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-service/loggy-ai:$COMMIT_SHA \
            --region=us-west1 \
            --no-allow-unauthenticated \
            --platform=managed \
            --service-account=sa-loggy-ai-runtime@${{ vars.GOOGLE_PROJECT }}.iam.gserviceaccount.com \
            --set-secrets="GEMINI_API_KEY=gemini-key:latest" \
            --set-env-vars="PROJECT_ID=${{ vars.GOOGLE_PROJECT }}"

  build_and_deploy_dashboard:
    needs: verify-prerequisites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GOOGLE_PROJECT }}
          service_account: cicd-sa@${{ vars.GOOGLE_PROJECT }}.iam.gserviceaccount.com
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set Up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build Image
        run: |
          gcloud auth configure-docker us-west1-docker.pkg.dev
          cd dashboard
          COMMIT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          docker build --platform="linux/amd64" -t loggy-ai-dashboard:$COMMIT_SHA .
          docker tag loggy-ai-dashboard:$COMMIT_SHA us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-dashboard/loggy-ai-dashboard:$COMMIT_SHA
          docker push us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-dashboard/loggy-ai-dashboard:$COMMIT_SHA

      - name: Deploy to Cloud Run
        run: |
          COMMIT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          gcloud run deploy loggy-ai-dashboard \
            --image=us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-dashboard/loggy-ai-dashboard:$COMMIT_SHA \
            --region=us-west1 \
            --no-allow-unauthenticated \
            --iap \
            --platform=managed \
            --service-account=sa-loggy-ai-runtime@${{ vars.GOOGLE_PROJECT }}.iam.gserviceaccount.com \
            --set-env-vars="PROJECT_ID=${{ vars.GOOGLE_PROJECT }}"
