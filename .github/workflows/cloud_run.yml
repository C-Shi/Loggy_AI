name: Cloud Run

on:
  workflow_run:
    workflows: ["Terraform"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GOOGLE_PROJECT }}
          service_account: cicd-sa@${{ vars.GOOGLE_PROJECT }}.iam.gserviceaccount.com
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set Up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build Image
        run: |
          gcloud auth configure-docker us-west1-docker.pkg.dev
          cd loggy_ai
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build --platform="linux/amd64" -t loggy-ai:$COMMIT_SHA .
          docker tag loggy-ai:$COMMIT_SHA us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-image/loggy-ai:$COMMIT_SHA
          docker push us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-image/loggy-ai:$COMMIT_SHA

      - name: Deploy to Cloud Run
        run: |
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          gcloud run deploy loggy-ai-service \
            --image=us-west1-docker.pkg.dev/${{ vars.GOOGLE_PROJECT }}/loggy-ai-image/loggy-ai:$COMMIT_SHA \
            --region=us-west1 \
            --no-allow-unauthenticated \
            --platform=managed \
            --service-account=sa-loggy-ai-runtime@${{ vars.GOOGLE_PROJECT }}.iam.gserviceaccount.com \
            --set-secrets="GEMINI_API_KEY=gemini-key:latest" \
            --set-env-vars="PROJECT_ID=${{ vars.GOOGLE_PROJECT }}"
