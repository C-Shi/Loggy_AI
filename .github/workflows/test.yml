name: Service Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  service-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest --cov=service --cov=api --cov-report=term-missing
